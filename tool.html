<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hoàng Minh🇻🇳</title>
<meta name="description" content="Xin Chào😘">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato&display=swap">
<style>
body {
    background-color: rgba(176, 224, 230);
    text-align: center;
    font-family: 'Lato', sans-serif;
}

/* Style cho phần thông tin */
.profile-card {
    background-color: rgb(240, 230, 140);
    width: 90%;
    max-width: 400px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
}

.profile-card img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
}

/* Nút lấy key */
.button {
    background-color: #4c56af;
    color: white;
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}
.button:hover {
    background-color: #3b458c;
}

/* Nút chuyển link */
.link-buttons {
    margin-top: 20px;
}
.custom-btn {
    background: linear-gradient(0deg, rgba(96,9,240,1) 0%, rgba(129,5,240,1) 100%);
    color: white;
    padding: 10px 20px;
    border-radius: 5px;
    display: inline-block;
    text-decoration: none;
    font-size: 16px;
    margin: 5px;
    transition: 0.3s;
}
.custom-btn:hover {
    background: rgba(96,9,240,0.8);
}
</style>
</head>
<body>

<div class="profile-card">
    <img src="https://i.imgur.com/rYkgGD3.png" alt="Profile">
    <h2>Hoàng Minh🇻🇳</h2>
    <p>Cảm Ơn Bạn Đã Lấy Key - Đây Là Key Của Bạn Hôm Nay!</p>

    <p><b>FACEBOOK:</b> <a href="https://fb.com/mh0zz">fb.com/mh0zz</a></p>
    <p><b>TELEGRAM:</b> <a href="https://t.me/vcl_mh0zz">t.me/vcl_mh0zz</a></p>
    <p><b>TIKTOK:</b> <a href="https://www.tiktok.com/@mh0zz">tiktok.com/@mh0zz</a></p>

    <h3>CLICK VÀO ĐÂY ĐỂ SAO CHÉP KEY</h3>
    <button class="button" onclick="copyToClipboard()"> 
        <span id="keytool">BẠN CHƯA LẤY KEY</span>
    </button>
</div>

<!-- 4 Nút Chuyển Link -->
<div class="link-buttons">
    <a href="https://example1.com" class="custom-btn">Link 1</a>
    <a href="https://example2.com" class="custom-btn">Link 2</a>
    <a href="https://example3.com" class="custom-btn">Link 3</a>
    <a href="https://example4.com" class="custom-btn">Link 4</a>
</div>

<!-- Script lấy key từ URL và copy vào clipboard -->
<script>
function getParameterByName(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}

function copyToClipboard() {
    let key = document.getElementById("keytool").textContent;
    if (key === "BẠN CHƯA LẤY KEY") {
        alert("Chưa có key để sao chép!");
        return;
    }

    navigator.clipboard.writeText(key).then(() => {
        alert("Copy Key thành công: " + key);
    }).catch(err => {
        console.error("Lỗi copy:", err);
    });
}

// Lấy key từ URL và hiển thị
window.onload = function() {
    let key = getParameterByName('key');
    if (key) {
        document.getElementById("keytool").textContent = key;
    }
};
</script>

</body>
</html>
