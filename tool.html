<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hoàng Minh🇻🇳</title>
<meta name="description" content="Xin Chào😘">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato&display=swap">

<style>
body {
    background-color: rgba(176, 224, 230);
    text-align: center;
    font-family: 'Lato', sans-serif;
}

/* Style cho phần thông tin */
.profile-card {
    background-color: rgb(240, 230, 140);
    width: 90%;
    max-width: 400px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
}

.profile-card img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
}

/* Nút lấy key */
.button {
    background-color: #4c56af;
    color: white;
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}
.button:hover {
    background-color: #3b458c;
}

/* Nút chuyển link */
.link-buttons {
    margin-top: 20px;
}
.custom-btn {
    background: linear-gradient(0deg, rgba(96,9,240,1) 0%, rgba(129,5,240,1) 100%);
    color: white;
    padding: 10px 20px;
    border-radius: 5px;
    display: inline-block;
    text-decoration: none;
    font-size: 16px;
    margin: 5px;
    transition: 0.3s;
}
.custom-btn:hover {
    background: rgba(96,9,240,0.8);
}

/* Hiệu ứng lá rơi */
.snowflake {
    position: fixed;
    top: -10%;
    z-index: 9999;
    user-select: none;
    font-size: 1.5em;
    text-shadow: 0 0 5px #000;
    animation-name: snowflakes-fall, snowflakes-shake;
    animation-duration: 10s, 3s;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
}
@keyframes snowflakes-fall {
    0% {top: -10%;}
    100% {top: 100%;}
}
@keyframes snowflakes-shake {
    0%, 100% {transform: translateX(0);}
    50% {transform: translateX(80px);}
}
</style>
</head>
<body>

<!-- Hiệu ứng lá rơi -->
<div class="snowflakes" aria-hidden="true">
    <div class="snowflake">🍁</div>
    <div class="snowflake">🌸</div>
    <div class="snowflake">🔥</div>
    <div class="snowflake">🍁</div>
    <div class="snowflake">🌸</div>
    <div class="snowflake">🔥</div>
    <div class="snowflake">🍁</div>
    <div class="snowflake">🌸</div>
    <div class="snowflake">🔥</div>
</div>

<div class="profile-card">
    <img src="https://i.imgur.com/rYkgGD3.png" alt="Profile">
    <h2>Hoàng Minh🇻🇳</h2>
    <p>Cảm Ơn Bạn Đã Lấy Key - Đây Là Key Của Bạn Hôm Nay!</p>

    <p><b>FACEBOOK:</b> <a href="https://fb.com/mh0zz">fb.com/mh0zz</a></p>
    <p><b>TELEGRAM:</b> <a href="https://t.me/vcl_mh0zz">t.me/vcl_mh0zz</a></p>
    <p><b>TIKTOK:</b> <a href="https://www.tiktok.com/@mh0zz">tiktok.com/@mh0zz</a></p>

    <h3>CLICK VÀO ĐÂY ĐỂ SAO CHÉP KEY</h3>
    <button class="button" onclick="copyToClipboard()"> 
        <span id="keytool">BẠN CHƯA LẤY KEY</span>
    </button>
</div>

<!-- 4 Nút Chuyển Link -->
<div class="link-buttons">
    <a href="https://drive.google.com/file/d/136rSMyImjScjONk4A-chvh1nLF-yD5ob/view?usp=drivesdk" class="custom-btn">Tool Buff TikTok Đa Luồng</a>
    <a href="https://example2.com" class="custom-btn">Link 2</a>
    <a href="https://example3.com" class="custom-btn">Link 3</a>
    <a href="https://example4.com" class="custom-btn">Link 4</a>
</div>

<!-- Script lấy key từ URL và copy vào clipboard -->
<script>
function getParameterByName(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}

function copyToClipboard() {
    let key = document.getElementById("keytool").textContent;
    if (key === "BẠN CHƯA LẤY KEY") {
        alert("Chưa có key để sao chép!");
        return;
    }

    navigator.clipboard.writeText(key).then(() => {
        alert("Copy Key thành công: " + key);
    }).catch(err => {
        console.error("Lỗi copy:", err);
    });
}

// Lấy key từ URL và hiển thị
window.onload = function() {
    let key = getParameterByName('key');
    if (key) {
        document.getElementById("keytool").textContent = key;
    }
};

// Tạo hiệu ứng lá rơi ngẫu nhiên
document.addEventListener("DOMContentLoaded", function() {
    let snowflakes = document.querySelectorAll(".snowflake");
    snowflakes.forEach((flake, index) => {
        flake.style.left = Math.random() * 100 + "vw";
        flake.style.animationDelay = Math.random() * 10 + "s";
    });
});
</script>

</body>
</html>
